<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>노트북LM 쉬운 설치 체험</title>
    <link rel="stylesheet" href="installer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div style="margin-bottom: 30px;">
            <img src="mascot.png" alt="Mascot" style="width: 180px; height: 180px; border-radius: 50%; border: 5px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.15); animation: float 4s ease-in-out infinite;">
        </div>
        <h1>나만의 똑똑한 비서 <br> <span style="color:var(--primary)">노트북LM</span> 친구 만들기</h1>
    <p class="description">
        복잡한 설치는 제가 대신해 드릴게요!<br>
        아래 버튼만 순서대로 눌러주시면 멋진 공부 도우미가 완성됩니다.
    </p>

        <div class="steps-container">
            <div class="progress-bar-fill" id="progressBar"></div>
            <div class="step active" id="step-btn-1">1</div>
            <div class="step" id="step-btn-2">2</div>
            <div class="step" id="step-btn-3">3</div>
            <div class="step" id="step-btn-4">4</div>
            <div class="step" id="step-btn-5">5</div>
        </div>

        <div class="content-box">
            <div id="statusIcon" class="status-icon">
                <i class="fas fa-rocket" style="color:#f39c12"></i>
            </div>
            <h2 id="stepTitle">준비되셨나요?</h2>
            <p id="stepDescription" style="margin-top:20px; font-size:1.1rem; min-height:60px;">
                "시작하기" 버튼을 눌러주세요! 
            </p>
            <div id="guideText" class="guide-text">
                <p><strong>💡 팁:</strong> <span id="guideTip">이 단계를 진행하려면 터미널에서 nlm login을 입력하세요.</span></p>
            </div>
            <div id="stepIcons" class="step-icons">
            <!-- Icons will be injected here -->
        </div>

        <div id="instructionBox" class="instruction-box" style="display:none;">
            <!-- step instructions will be injected here -->
        </div>

        <div id="commandContainer" class="command-container" style="display:none;">
            <div class="command-item">
                <span id="commandText" class="command-text"></span>
                <button id="copyBtn" class="copy-btn">
                    <span>📋</span> <span class="copy-label">복사</span>
                </button>
            </div>
        </div>

        <div id="terminalContainer" class="terminal-wrapper" style="display:none;">
                <div class="terminal-header">
                    <div class="dot red"></div>
                    <div class="dot yellow"></div>
                    <div class="dot green"></div>
                    <span class="terminal-title">Windows Terminal</span>
                </div>
                <div class="terminal-body" id="terminalBody">
                    <span class="terminal-prompt">></span>
                    <span id="terminalCmd" class="terminal-command"></span>
                    <span class="cursor"></span>
                    <div id="terminalResult" style="margin-top: 5px; font-size: 0.9rem; color: #888; display: none;">로그인을 시도하는 중...</div>
                </div>
            </div>
        </div>

        <div class="actions">
            <button id="mainBtn" class="action-btn">시작하기</button>
        </div>

        <div style="margin-top: 40px; font-size: 0.9rem; color: #888;">
            * 이 페이지는 설치 과정을 연습하고 시뮬레이션하는 도우미입니다.
        </div>
    </div>

    <script>
        // Steps data: Aligned with real installation workflow
        const steps = [
            {
                id: 0,
                icon: "🚀",
                title: "시작하기",
                desc: "설치에 필요한 준비가 끝났습니다. 첫 번째 단계를 진행할까요?",
                detail: "실제 컴퓨터에서 <strong>터미널(Terminal)</strong> 또는 <strong>PowerShell</strong> 창을 열고 준비해 주세요.",
                btnText: "좋아요, 시작!"
            },
            {
                id: 1,
                icon: "🔍",
                title: "1단계: 현재 상태 확인",
                desc: "먼저 내 컴퓨터에 설치된 서버 정보를 확인합니다.",
                detail: "아래 명령어를 복사해서 터미널에 붙여넣고 엔터를 치세요.",
                command: "mcp_notebooklm-mcp_server_info",
                btnText: "다음으로 넘어가기"
            },
            {
                id: 2,
                icon: "🪄",
                title: "2단계: 최신 버전 업데이트",
                desc: "새로운 기능을 위해 프로그램을 최신으로 업데이트합니다.",
                detail: "이미 설치되어 있더라도 한 번 더 최신버전으로 명령어를 입력해 주세요.",
                command: "pip install --upgrade notebooklm-mcp-cli",
                btnText: "이제 거의 다 됐어요!"
            },
            {
                id: 3,
                icon: "🔑",
                title: "3단계: 구글 로그인 하기",
                desc: "로그인 열쇠를 돌릴 시간이에요! 브라우저가 하나 뜰 거예요.",
                detail: "명령어를 입력하면 구글 로그인 창이 열립니다. 평소처럼 로그인해 주세요.",
                command: "nlm login",
                btnText: "로그인 완료했어요!"
            },
            {
                id: 4,
                icon: "🔄",
                title: "4단계: 연결 정보 새로고침",
                desc: "로그인 정보와 노트북 내용을 동기화합니다.",
                detail: "로그인 후 컴퓨터가 새로운 정보를 인식할 수 있게 마지막으로 명령을 내립니다.",
                command: "mcp_notebooklm-mcp_refresh_auth",
                btnText: "마지막 확인하기"
            },
            {
                id: 5,
                icon: "✅",
                title: "최종 검증 및 완료!",
                desc: "축하합니다! 이제 제가 당신을 도울 준비가 끝났습니다.",
                detail: "아래 명령어로 당신의 노트북 리스트가 잘 나오는지 최종 확인해 보세요.",
                command: "mcp_notebooklm-mcp_notebook_list",
                btnText: "처음부터 다시 보기"
            }
        ];

        let currentStep = 0;
        const mainBtn = document.getElementById('mainBtn');
        const mainTitle = document.getElementById('stepTitle');
        const mainDesc = document.getElementById('stepDescription');
        const statusIcon = document.getElementById('statusIcon');
        const progressBar = document.getElementById('progressBar');
        const guideText = document.getElementById('guideText'); // This will be hidden or removed
        const guideTip = document.getElementById('guideTip'); // This will be hidden or removed
        const terminalContainer = document.getElementById('terminalContainer'); // Renamed from terminalWrapper
        const terminalCmd = document.getElementById('terminalCmd');
        const terminalResult = document.getElementById('terminalResult');
        const instructionBox = document.getElementById('instructionBox');
        const commandContainer = document.getElementById('commandContainer');
        const commandText = document.getElementById('commandText');
        const copyBtn = document.getElementById('copyBtn');


        function updateUI() {
            const step = steps[currentStep];
            
            // Text updates
            mainTitle.textContent = step.title;
            mainDesc.innerHTML = step.desc;
            mainBtn.textContent = step.btnText;
            
            // Instruction detail update
            if (step.detail) {
                instructionBox.style.display = 'block';
                instructionBox.innerHTML = step.detail;
            } else {
                instructionBox.style.display = 'none';
            }

            // Command element update
            if (step.command) {
                commandContainer.style.display = 'flex';
                commandText.textContent = step.command;
                copyBtn.classList.remove('copied');
            } else {
                commandContainer.style.display = 'none';
            }

            // Terminal visibility and typewriter effect for step 3 (Login step)
            if (currentStep === 3) {
                terminalContainer.style.display = 'block';
                terminalCmd.innerText = "";
                terminalResult.style.display = 'none';
                
                let i = 0;
                function typeWriter() {
                    if (currentStep !== 3) return; // Prevent animation if moved away
                    if (i < step.command.length) {
                        terminalCmd.innerText += step.command.charAt(i);
                        i++;
                        setTimeout(typeWriter, 100);
                    } else {
                        setTimeout(() => {
                            if (currentStep === 3) terminalResult.style.display = 'block';
                        }, 500);
                    }
                }
                setTimeout(typeWriter, 800);
            } else {
                terminalContainer.style.display = 'none';
            }

            // Icon update
            statusIcon.innerHTML = step.icon;

            // Progress Bar & Step Dots
            const progressMapping = [0, 20, 40, 60, 80, 100];
            progressBar.style.width = `${progressMapping[currentStep]}%`;

            for (let i = 1; i <= 5; i++) {
                const el = document.getElementById(`step-btn-${i}`);
                if (!el) continue;
                if (i <= currentStep) {
                    el.classList.add('completed');
                    el.classList.remove('active');
                    el.innerHTML = '<i class="fas fa-check"></i>';
                } else if (i === currentStep + 1) {
                    el.classList.add('active');
                    el.classList.remove('completed');
                    el.innerHTML = i;
                } else {
                    el.classList.remove('active', 'completed');
                    el.innerHTML = i;
                }
            }

            // Success Confetti
            if (currentStep === steps.length - 1) {
                createConfetti();
            }
        }

        mainBtn.addEventListener('click', () => {
            if (currentStep < steps.length - 1) {
                currentStep++;
                updateUI();
            } else {
                currentStep = 0;
                updateUI();
            }
        });

        // Copy to clipboard logic
        copyBtn.addEventListener('click', () => {
            const cmd = commandText.textContent;
            navigator.clipboard.writeText(cmd).then(() => {
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.classList.remove('copied');
                }, 1500);
            }).catch(err => {
                console.error('복사 실패:', err);
                alert('명령어 복사에 실패했습니다. 수동으로 복사해 주세요.');
            });
        });

        // Initialize
        updateUI();

        function createConfetti() {
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                confetti.style.backgroundColor = ['#6366f1', '#a855f7', '#f43f5e', '#10b981', '#fbbf24'][Math.floor(Math.random() * 5)];
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 5000);
            }
        }
    </script>
    <style>
        .confetti {
            position: fixed;
            top: -10px;
            width: 10px;
            height: 10px;
            z-index: 1000;
            pointer-events: none;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
</body>
</html>
