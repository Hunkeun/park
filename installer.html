<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>노트북LM 쉬운 설치 체험</title>
    <link rel="stylesheet" href="installer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div style="margin-bottom: 30px;">
            <img src="mascot.png" alt="Mascot" style="width: 180px; height: 180px; border-radius: 50%; border: 5px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.15); animation: float 4s ease-in-out infinite;">
        </div>
        <h1>나만의 똑똑한 비서 <br> <span style="color:var(--primary)">노트북LM</span> 친구 만들기</h1>
    <p class="description">
        복잡한 설치는 제가 대신해 드릴게요!<br>
        아래 버튼만 순서대로 눌러주시면 멋진 공부 도우미가 완성됩니다.
    </p>

        <div class="steps-container">
            <div class="progress-bar-fill" id="progressBar"></div>
            <div class="step active" id="step-btn-1">1</div>
            <div class="step" id="step-btn-2">2</div>
            <div class="step" id="step-btn-3">3</div>
            <div class="step" id="step-btn-4">4</div>
            <div class="step" id="step-btn-5">5</div>
        </div>

        <div class="content-box">
            <div id="statusIcon" class="status-icon">
                <i class="fas fa-rocket" style="color:#f39c12"></i>
            </div>
            <h2 id="stepTitle">준비되셨나요?</h2>
            <p id="stepDescription" style="margin-top:20px; font-size:1.1rem; min-height:60px;">
                "시작하기" 버튼을 눌러주세요! 
            </p>
            <div id="guideText" class="guide-text">
                <p><strong>💡 팁:</strong> <span id="guideTip">이 단계를 진행하려면 터미널에서 nlm login을 입력하세요.</span></p>
            </div>

            <!-- 터미널 시뮬레이션 추가 -->
            <div id="terminalWrapper" class="terminal-wrapper">
                <div class="terminal-header">
                    <div class="dot red"></div>
                    <div class="dot yellow"></div>
                    <div class="dot green"></div>
                    <span class="terminal-title">Windows Terminal</span>
                </div>
                <div class="terminal-body" id="terminalBody">
                    <span class="terminal-prompt">></span>
                    <span id="terminalCmd" class="terminal-command"></span>
                    <span class="cursor"></span>
                    <div id="terminalResult" style="margin-top: 5px; font-size: 0.9rem; color: #888; display: none;">로그인을 시도하는 중...</div>
                </div>
            </div>
        </div>

        <div class="actions">
            <button id="mainBtn" class="action-btn">시작하기</button>
        </div>

        <div style="margin-top: 40px; font-size: 0.9rem; color: #888;">
            * 이 페이지는 설치 과정을 연습하고 시뮬레이션하는 도우미입니다.
        </div>
    </div>

    <script>
        const steps = [
            {
                title: "시작하기",
                icon: "fa-rocket",
                color: "#f39c12",
                desc: "설치에 필요한 준비가 끝났습니다. 첫 번째 단계를 진행할까요?",
                btn: "좋아요, 시작!"
            },
            {
                title: "서버 확인 중...",
                icon: "fa-search",
                color: "var(--primary)",
                desc: "우선 컴퓨터가 노트북LM과 친해질 준비가 됐는지 <br> 똑똑하게 살펴보고 있어요. (1단계)",
                btn: "다음으로 넘어가기",
                guide: false
            },
            {
                title: "새 옷으로 갈아입기",
                icon: "fa-wand-magic-sparkles",
                color: "var(--secondary)",
                desc: "가장 최신 기능을 사용할 수 있도록 <br> 반짝반짝하게 업데이트 중이에요! (2단계)",
                btn: "이제 거의 다 됐어요!",
                guide: false
            },
            {
                title: "로그인 열쇠를 돌려주세요!",
                icon: "fa-fingerprint",
                color: "var(--accent)",
                desc: "이제 '로그인' 단계예요. <br> 브라우저(인터넷 창)가 열리면 버튼을 눌러주세요.",
                btn: "로그인 완료했어요!",
                command: "nlm login",
                guide: "터미널(검은 창)에 'nlm login'을 입력하고 엔터를 친 뒤, 인터넷 창에서 로그인하세요."
            },
            {
                title: "인증 정보 새로고침",
                icon: "fa-rotate",
                color: "#6366f1",
                desc: "로그인한 정보를 내 컴퓨터에 <br> 잘 저장하도록 새로고침을 할게요.",
                btn: "마지막 확인하기",
                guide: false
            },
            {
                title: "성공! 이제 제 친구예요!",
                icon: "fa-face-grin-stars",
                color: "var(--success)",
                desc: "축하합니다! 이제 똑똑한 AI 친구 <br> 노트북LM을 마음껏 사용하실 수 있어요!",
                btn: "처음부터 다시 보기",
                guide: false
            }
        ];

        let currentStep = 0;
        const mainBtn = document.getElementById('mainBtn');
        const stepTitle = document.getElementById('stepTitle');
        const stepDescription = document.getElementById('stepDescription');
        const statusIcon = document.getElementById('statusIcon');
        const progressBar = document.getElementById('progressBar');
        const guideText = document.getElementById('guideText');
        const guideTip = document.getElementById('guideTip');
        const terminalWrapper = document.getElementById('terminalWrapper');
        const terminalCmd = document.getElementById('terminalCmd');
        const terminalResult = document.getElementById('terminalResult');

        function updateUI() {
            const step = steps[currentStep];
            stepTitle.innerText = step.title;
            stepDescription.innerHTML = step.desc;
            statusIcon.innerHTML = `<i class="fas ${step.icon}" style="color:${step.color}"></i>`;
            mainBtn.innerText = step.btn;
            
            // Success Confetti
            if (currentStep === steps.length - 1) {
                createConfetti();
            }

            // Progress Bar & Step Dots
            const progressMapping = [0, 20, 40, 60, 80, 100];
            progressBar.style.width = `${progressMapping[currentStep]}%`;

            for (let i = 1; i <= 5; i++) {
                const el = document.getElementById(`step-btn-${i}`);
                if (i <= currentStep) {
                    el.classList.add('completed');
                    el.classList.remove('active');
                    el.innerHTML = '<i class="fas fa-check"></i>';
                } else if (i === currentStep + 1) {
                    el.classList.add('active');
                    el.classList.remove('completed');
                    el.innerHTML = i;
                } else {
                    el.classList.remove('active', 'completed');
                    el.innerHTML = i;
                }
            }

            if (step.guide) {
                guideText.style.display = 'block';
                guideTip.innerText = step.guide;
            } else {
                guideText.style.display = 'none';
            }

            // Terminal Command Handling
            if (step.command) {
                terminalWrapper.style.display = 'block';
                terminalCmd.innerText = "";
                terminalResult.style.display = 'none';
                
                // Typewriter effect
                let i = 0;
                function type() {
                    if (i < step.command.length) {
                        terminalCmd.innerText += step.command.charAt(i);
                        i++;
                        setTimeout(type, 100);
                    } else {
                        setTimeout(() => {
                            terminalResult.style.display = 'block';
                        }, 500);
                    }
                }
                setTimeout(type, 800);
            } else {
                terminalWrapper.style.display = 'none';
            }
        }

        mainBtn.addEventListener('click', () => {
            if (currentStep < steps.length - 1) {
                currentStep++;
                updateUI();
            } else {
                currentStep = 0;
                updateUI();
            }
        });

        // Initialize
        updateUI();
        function createConfetti() {
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                confetti.style.backgroundColor = ['#6366f1', '#a855f7', '#f43f5e', '#10b981', '#fbbf24'][Math.floor(Math.random() * 5)];
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 5000);
            }
        }
    </script>
    <style>
        .confetti {
            position: fixed;
            top: -10px;
            width: 10px;
            height: 10px;
            z-index: 1000;
            pointer-events: none;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
</body>
</html>
