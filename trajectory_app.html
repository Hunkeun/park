<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>미사일 궤적 시뮬레이션</title>
    <style>
        body { 
            margin: 0; 
            padding: 20px; 
            background-color: #0f1115; 
            color: #ffffff; 
            font-family: 'Inter', system-ui, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .container {
            width: 100%;
            max-width: 900px;
        }
        h1 {
            text-align: center;
            background: -webkit-linear-gradient(45deg, #ff6b6b, #ff8e53);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
        canvas { 
            width: 100%;
            background-color: #1a1d24; 
            border: 1px solid #2d3139; 
            border-radius: 12px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.5); 
        }
        .controls { 
            margin-top: 25px; 
            display: flex; 
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px; 
            background: #1a1d24; 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid #2d3139;
        }
        .control-group { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            width: 200px;
        }
        label {
            font-size: 14px;
            color: #a0a5b1;
            font-weight: 600;
        }
        input[type=range] {
            accent-color: #ff6b6b;
        }
        .value-display {
            font-size: 18px;
            font-weight: bold;
            color: #ff6b6b;
            text-align: right;
        }
        button { 
            align-self: flex-end;
            padding: 12px 30px; 
            background: linear-gradient(45deg, #ff6b6b, #ff4040); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px;
            font-weight: bold; 
            transition: transform 0.1s, box-shadow 0.1s;
        }
        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        #stats {
            margin-top: 15px;
            text-align: center;
            color: #a0a5b1;
            font-size: 15px;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>미사일 궤적 시뮬레이터</h1>
        <!-- 해상도를 높게 잡고 CSS로 크기 조절하여 선명하게 렌더링 -->
        <canvas id="simulationCanvas" width="900" height="400"></canvas>
        
        <div id="stats">발사 대기 중...</div>

        <div class="controls">
            <div class="control-group">
                <label for="velocity">발사 속도 (m/s)</label>
                <input type="range" id="velocity" min="10" max="150" value="30">
                <div class="value-display"><span id="velValue">30</span> m/s</div>
            </div>
            <div class="control-group">
                <label for="angle">발사 각도 (°)</label>
                <input type="range" id="angle" min="10" max="85" value="45">
                <div class="value-display"><span id="angValue">45</span>°</div>
            </div>
            <button id="fireBtn">🚀 발사!</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simulationCanvas');
        const ctx = canvas.getContext('2d');
        const velocityInput = document.getElementById('velocity');
        const angleInput = document.getElementById('angle');
        const fireBtn = document.getElementById('fireBtn');
        const velValue = document.getElementById('velValue');
        const angValue = document.getElementById('angValue');
        const statsDisplay = document.getElementById('stats');

        velocityInput.addEventListener('input', e => velValue.textContent = e.target.value);
        angleInput.addEventListener('input', e => angValue.textContent = e.target.value);

        let animationId;
        const gravity = 9.81;

        // 배경 모눈종이 그리기
        function drawGrid() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#2d3139';
            ctx.lineWidth = 1;
            
            // 50px 간격의 그리드
            for(let i = 0; i < canvas.width; i += 50) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            for(let i = 0; i < canvas.height; i += 50) {
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }
            
            // 바닥 선
            ctx.strokeStyle = '#4a505c';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, canvas.height - 20);
            ctx.lineTo(canvas.width, canvas.height - 20);
            ctx.stroke();
        }

        function launch() {
            if(animationId) cancelAnimationFrame(animationId);
            
            const v0 = parseFloat(velocityInput.value);
            const angle = parseFloat(angleInput.value) * Math.PI / 180;
            
            const vx = v0 * Math.cos(angle);
            const vy = v0 * Math.sin(angle);
            
            let t = 0;
            const dt = 0.03; // 시간에 따른 진행 속도
            const scale = 3; // 1m = 3px 변환 비율 (화면에 맞추기 위해)

            drawGrid();
            
            const groundY = canvas.height - 20;
            const startX = 20; // 좌측 여백 설정
            
            let lastCanvasX = startX;
            let lastCanvasY = groundY;
            let maxHeight = 0;

            function animate() {
                t += dt;
                
                // 물리 방적식 적용
                const x = vx * t;
                const y = vy * t - 0.5 * gravity * t * t;
                
                if (y > maxHeight) maxHeight = y;

                const canvasX = startX + x * scale;
                const canvasY = groundY - y * scale;
                
                // 부드러운 궤적 선 그리기
                ctx.beginPath();
                ctx.moveTo(lastCanvasX, lastCanvasY);
                ctx.lineTo(canvasX, canvasY);
                ctx.strokeStyle = '#ff6b6b';
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.stroke();

                // 미사일 머리 부분 (빨간 점) 
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(canvasX, canvasY, 4, 0, Math.PI * 2);
                ctx.fill();

                // 잔소리를 지워주기 위해, 선을 그리고 미사일 머리를 계속 업데이트 (잔상은 안지우고 누적)
                lastCanvasX = canvasX;
                lastCanvasY = canvasY;
                
                // 실시간 스탯 표시
                statsDisplay.innerHTML = `비행 시간: <b>${t.toFixed(1)}s</b> &nbsp; | &nbsp; 고도: <b>${Math.max(0, y).toFixed(1)}m</b> &nbsp; | &nbsp; 이동 거리: <b>${x.toFixed(1)}m</b>`;
                
                // 바닥(y=0) 이상이면서 캔버스를 벗어나지 않을 때까지 애니메이션
                if (y >= 0 && canvasX < canvas.width + 50) {
                    animationId = requestAnimationFrame(animate);
                } else {
                    // 바닥 착탄 시 폭발 이펙트
                    const hitX = canvasX;
                    const hitY = groundY;
                    
                    ctx.fillStyle = 'rgba(255, 107, 107, 0.5)';
                    ctx.beginPath();
                    ctx.arc(hitX, hitY, 20, 0, Math.PI*2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#ff8e53';
                    ctx.beginPath();
                    ctx.arc(hitX, hitY, 10, 0, Math.PI*2);
                    ctx.fill();
                    
                    statsDisplay.innerHTML = `💥 <b>착탄 완료!</b> (총 비행 시간: ${t.toFixed(1)}초, 사거리: ${x.toFixed(1)}m, 최고 고도: ${maxHeight.toFixed(1)}m)`;
                }
            }
            animate();
        }

        fireBtn.addEventListener('click', launch);
        drawGrid(); // 최초 화면에서 그리드 표시
        
        // AI가 사용자를 대신하여 발사 버튼을 '딸깍' 눌러줍니다! (0.5초 뒤 자동 발사)
        setTimeout(() => fireBtn.click(), 500);
    </script>
</body>
</html>
