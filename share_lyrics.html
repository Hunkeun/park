<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트폰 연결 - 가요 메들리 (가사형)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary-gold: #c5a059;
            --bg-dark: #0f1218;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-white: #ffffff;
            --text-gray: #a0a0a0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 500px;
            padding: 40px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, var(--primary-gold));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-gray);
            margin-bottom: 30px;
            font-size: 1rem;
            line-height: 1.6;
        }

        #qrcode {
            background: white;
            padding: 20px;
            border-radius: 16px;
            display: inline-block;
            margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(197, 160, 89, 0.2);
        }

        .info-box {
            background: rgba(197, 160, 89, 0.1);
            border: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: 12px;
            padding: 15px;
            font-size: 0.9rem;
            color: var(--primary-gold);
            margin-bottom: 20px;
        }

        .btn-back {
            color: var(--text-gray);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .btn-back:hover {
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>스마트폰으로 듣기</h1>
        <p>아래 QR 코드를 스마트폰 카메라로 스캔하면<br>나만의 메들리 플레이어가 열립니다.</p>
        
        <div id="qrcode"></div>

        <div class="info-box">
            이제 <strong>전 세계 어디서나</strong> 스마트폰으로<br>추억의 선율을 감상하실 수 있습니다!
        </div>

        <a href="medley_lyrics.html" class="btn-back">← 플레이어로 돌아가기</a>
    </div>

    <script>
        const publicUrl = "https://hunkeun.github.io/park/medley_lyrics.html";
        new QRCode(document.getElementById("qrcode"), {
            text: publicUrl,
            width: 200,
            height: 200,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    </script>
</body>
</html>
