<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>50·60·70 인기 가요 메들리 (가사 포함)</title>
    <meta name="description" content="조용필, 나훈아, 진성 등 50대부터 70대까지 사랑받는 인기 가요 10곡을 가사와 함께 감상할 수 있는 프리미엄 메들리 플레이어입니다.">
    <link rel="stylesheet" href="medley.css">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-overlay"></div>
    <div class="glow-container">
        <div class="glow-point" id="glow1"></div>
        <div class="glow-point" id="glow2"></div>
    </div>

    <main class="player-container">
        <header class="app-header">
            <h1 class="app-title">추억의 인기 가요 10선</h1>
            <p class="app-subtitle">가사와 함께 즐기는 명곡 메들리</p>
            <a href="share_player.html" class="share-btn">📱 스마트폰으로 듣기</a>
        </header>

        <section class="now-playing-section">
            <div class="album-art-container">
                <div class="album-art" id="albumArt">
                    <div id="youtube-player"></div>
                </div>
                <div class="playing-indicator">
                    <span></span><span></span><span></span><span></span>
                </div>
            </div>

            <div class="track-info">
                <h2 id="currentTitle" class="track-title">곡 제목을 불러오는 중...</h2>
                <p id="currentArtist" class="track-artist">가수 정보</p>
            </div>

            <div class="progress-container">
                <div class="time-info">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
                <div class="progress-bar-wrapper" id="progressWrapper">
                    <div class="progress-bar" id="progressBar"></div>
                    <div class="progress-handle"></div>
                </div>
            </div>

            <div class="controls-main">
                <button id="prevBtn" class="control-btn secondary" title="이전 곡">
                    <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                </button>
                <button id="playPauseBtn" class="control-btn primary" title="재생/일시정지">
                    <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pauseIcon" class="hidden" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button id="nextBtn" class="control-btn secondary" title="다음 곡">
                    <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
            </div>
        </section>

        <aside class="playlist-section">
            <div class="playlist-header">
                <h3>재생 목록</h3>
                <span id="playlistCount">10곡</span>
            </div>
            <ul id="playlistItems" class="playlist-items">
                <!-- Tracks will be injected here -->
            </ul>
        </aside>
    </main>

    <footer class="app-footer">
        <p>&copy; 2026 추억의 선율. All Rights Reserved.</p>
    </footer>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="medley.js"></script>
</body>
</html>
