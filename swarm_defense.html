<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWARM 방어 시뮬레이션</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050510;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none;
        }
        .panel {
            background: rgba(10, 20, 40, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 150, 255, 0.3);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 100, 255, 0.2);
        }
        h1 {
            margin: 0 0 15px 0;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        .stats {
            display: flex;
            gap: 20px;
            font-size: 18px;
            font-weight: bold;
        }
        .stat-red {
            color: #ff3366;
            text-shadow: 0 0 10px #ff3366;
        }
        .stat-blue {
            color: #33ccff;
            text-shadow: 0 0 10px #33ccff;
        }
        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }
        button {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            border: none;
            color: white;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3), 0 0 20px rgba(42, 82, 152, 0.5);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4), 0 0 25px rgba(42, 82, 152, 0.8);
            background: linear-gradient(135deg, #2a5298 0%, #1e3c72 100%);
        }
        button:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>
    <div id="ui">
        <div class="panel">
            <h1>SWARM 방어 시뮬레이션</h1>
            <div class="stats">
                <div class="stat-blue">청군 (방어위성): <span id="blueCount">30</span></div>
                <div class="stat-red">적군 (공격드론): <span id="redCount">20</span></div>
            </div>
        </div>
    </div>
    
    <div class="controls">
        <button onclick="initSimulation()">시뮬레이션 재시작</button>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const blueCountEl = document.getElementById('blueCount');
        const redCountEl = document.getElementById('redCount');

        let width, height;
        let particles = [];
        let explosions = [];
        let lasers = [];
        let animationId;

        class Vector {
            constructor(x, y) {
                this.x = x;
                this.y = y;
            }
            add(v) { this.x += v.x; this.y += v.y; return this; }
            sub(v) { this.x -= v.x; this.y -= v.y; return this; }
            mult(n) { this.x *= n; this.y *= n; return this; }
            div(n) { this.x /= n; this.y /= n; return this; }
            mag() { return Math.sqrt(this.x * this.x + this.y * this.y); }
            normalize() {
                let m = this.mag();
                if (m !== 0) { this.div(m); }
                return this;
            }
            limit(max) {
                if (this.mag() > max) {
                    this.normalize();
                    this.mult(max);
                }
                return this;
            }
            copy() { return new Vector(this.x, this.y); }
            static sub(v1, v2) { return new Vector(v1.x - v2.x, v1.y - v2.y); }
            static dist(v1, v2) {
                let dx = v1.x - v2.x;
                let dy = v1.y - v2.y;
                return Math.sqrt(dx * dx + dy * dy);
            }
        }

        class Particle {
            constructor(x, y, type) {
                this.pos = new Vector(x, y);
                this.vel = new Vector(Math.random() * 4 - 2, Math.random() * 4 - 2);
                this.acc = new Vector(0, 0);
                this.type = type; // 'red' or 'blue'
                
                // 설정 파라미터
                this.r = type === 'red' ? 4 : 5;
                this.maxSpeed = type === 'red' ? 2 : 2.5;
                this.maxForce = type === 'red' ? 0.05 : 0.08;
                this.health = type === 'red' ? 100 : 80;
                this.damage = type === 'red' ? 1.0 : 1.5;
                this.range = type === 'red' ? 40 : 50;
                this.color = type === 'red' ? '#ff3366' : '#33ccff';
                
                this.trail = [];
                this.cooldown = 0;
            }

            applyForce(force) {
                this.acc.add(force);
            }

            seek(target) {
                let desired = Vector.sub(target, this.pos);
                desired.normalize();
                desired.mult(this.maxSpeed);
                let steer = Vector.sub(desired, this.vel);
                steer.limit(this.maxForce);
                return steer;
            }

            separate(particles) {
                // 청군은 너무 뭉치지 않도록 분리 거리를 더 넓게 줍니다.
                let desiredSeparation = this.type === 'blue' ? this.r * 10 : this.r * 2.5;
                let steer = new Vector(0, 0);
                let count = 0;
                for (let i = 0; i < particles.length; i++) {
                    let other = particles[i];
                    if (other !== this && other.type === this.type) {
                        let d = Vector.dist(this.pos, other.pos);
                        if ((d > 0) && (d < desiredSeparation)) {
                            let diff = Vector.sub(this.pos, other.pos);
                            diff.normalize();
                            diff.div(d);
                            steer.add(diff);
                            count++;
                        }
                    }
                }
                if (count > 0) {
                    steer.div(count);
                }
                if (steer.mag() > 0) {
                    steer.normalize();
                    steer.mult(this.maxSpeed);
                    steer.sub(this.vel);
                    steer.limit(this.maxForce);
                }
                return steer;
            }

            cohesion(particles) {
                // 청군은 응집하는 반경을 좁혀서 덜 뭉치게 합니다.
                let neighbordist = this.type === 'blue' ? 40 : 100;
                let sum = new Vector(0, 0);
                let count = 0;
                for (let i = 0; i < particles.length; i++) {
                    let other = particles[i];
                    if (other !== this && other.type === this.type) {
                        let d = Vector.dist(this.pos, other.pos);
                        if ((d > 0) && (d < neighbordist)) {
                            sum.add(other.pos);
                            count++;
                        }
                    }
                }
                if (count > 0) {
                    sum.div(count);
                    return this.seek(sum);
                } else {
                    return new Vector(0, 0);
                }
            }

            closestEnemy(particles) {
                let minDist = Infinity;
                let closest = null;
                for (let p of particles) {
                    if (p.type !== this.type && p.health > 0) {
                        let d = Vector.dist(this.pos, p.pos);
                        if (d < minDist) {
                            minDist = d;
                            closest = p;
                        }
                    }
                }
                return { target: closest, dist: minDist };
            }

            update(particles) {
                let sep = this.separate(particles);
                let coh = this.cohesion(particles);
                let enemyInfo = this.closestEnemy(particles);
                
                let targetSteer = new Vector(0, 0);
                
                if (this.type === 'red') {
                    // 적군의 목표는 중심 기지파괴, 혹은 근접한 청군 요격
                    let baseDist = Vector.dist(this.pos, new Vector(width / 2, height / 2));
                    
                    if (enemyInfo.target && enemyInfo.dist < 150) {
                        targetSteer = this.seek(enemyInfo.target.pos);
                    } else {
                        targetSteer = this.seek(new Vector(width / 2, height / 2));
                    }
                    
                    if (enemyInfo.target && enemyInfo.dist < this.range && this.cooldown <= 0) {
                        enemyInfo.target.health -= this.damage;
                        this.cooldown = 15;
                        createLaser(this.pos, enemyInfo.target.pos, this.color);
                    }
                } else {
                    // 청군은 적군을 향해 요격
                    if (enemyInfo.target) {
                        targetSteer = this.seek(enemyInfo.target.pos);
                        
                        if (enemyInfo.dist < this.range && this.cooldown <= 0) {
                            enemyInfo.target.health -= this.damage;
                            this.cooldown = 10;
                            createLaser(this.pos, enemyInfo.target.pos, this.color);
                        }
                    } else {
                        // 남은 적이 없으면 기지 주위로 복귀
                        let base = new Vector(width / 2, height / 2);
                        if(Vector.dist(this.pos, base) > 100) {
                           targetSteer = this.seek(base);
                        }
                    }
                }

                if (this.cooldown > 0) this.cooldown--;

                if (this.type === 'blue') {
                    // 청군은 분리(거리유지)의 가중치를 높이고, 응집을 낮춥니다.
                    sep.mult(3.0);
                    coh.mult(0.2);
                } else {
                    sep.mult(1.5);
                    coh.mult(1.0);
                }
                targetSteer.mult(1.2);

                this.applyForce(sep);
                this.applyForce(coh);
                this.applyForce(targetSteer);

                this.vel.add(this.acc);
                this.vel.limit(this.maxSpeed);
                this.pos.add(this.vel);
                this.acc.mult(0);

                // 트레일 업데이트
                this.trail.push(this.pos.copy());
                if (this.trail.length > 8) this.trail.shift();
            }

            draw(ctx) {
                // 잔상
                if (this.trail.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);
                    for (let i = 1; i < this.trail.length; i++) {
                        ctx.lineTo(this.trail[i].x, this.trail[i].y);
                    }
                    ctx.strokeStyle = this.color + '66';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }

                // 기체
                ctx.beginPath();
                ctx.arc(this.pos.x, this.pos.y, this.r, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;
                
                // 체력바
                let hpPercent = this.health / (this.type === 'red' ? 100 : 80);
                if (hpPercent < 1) {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.fillRect(this.pos.x - 8, this.pos.y - 10, 16, 2);
                    ctx.fillStyle = hpPercent > 0.5 ? '#0f0' : (hpPercent > 0.2 ? '#ff0' : '#f00');
                    ctx.fillRect(this.pos.x - 8, this.pos.y - 10, 16 * hpPercent, 2);
                }
            }
        }

        function createLaser(start, end, color) {
            lasers.push({
                start: start.copy(),
                end: end.copy(),
                color: color,
                life: 1.0
            });
        }

        class Explosion {
            constructor(x, y, color) {
                this.color = color;
                this.particles = [];
                for(let i=0; i<12; i++) {
                    let angle = Math.random() * Math.PI * 2;
                    let speed = Math.random() * 2 + 1;
                    this.particles.push({
                        pos: new Vector(x, y),
                        vel: new Vector(Math.cos(angle) * speed, Math.sin(angle) * speed),
                        life: 1.0,
                        decay: Math.random() * 0.05 + 0.03
                    });
                }
            }
            update() {
                for (let p of this.particles) {
                    p.pos.add(p.vel);
                    p.life -= p.decay;
                }
                this.particles = this.particles.filter(p => p.life > 0);
            }
            draw(ctx) {
                for (let p of this.particles) {
                    ctx.beginPath();
                    ctx.arc(p.pos.x, p.pos.y, 2 * p.life, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = p.life;
                    ctx.fill();
                }
                ctx.globalAlpha = 1.0;
            }
        }

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        function initSimulation() {
            particles = [];
            explosions = [];
            lasers = [];
            
            // 청군(30개) 방어 기지 주변 스폰
            for (let i = 0; i < 30; i++) {
                let angle = Math.random() * Math.PI * 2;
                let r = Math.random() * 80 + 30;
                particles.push(new Particle(width / 2 + Math.cos(angle) * r, height / 2 + Math.sin(angle) * r, 'blue'));
            }

            // 적군(20개) 화면 외곽에서 침투
            for (let i = 0; i < 20; i++) {
                let x, y;
                if (Math.random() < 0.5) {
                    x = Math.random() < 0.5 ? -30 : width + 30;
                    y = Math.random() * height;
                } else {
                    x = Math.random() * width;
                    y = Math.random() < 0.5 ? -30 : height + 30;
                }
                particles.push(new Particle(x, y, 'red'));
            }
            updateStats();
        }

        function updateStats() {
            let blue = particles.filter(p => p.type === 'blue').length;
            let red = particles.filter(p => p.type === 'red').length;
            blueCountEl.innerText = blue;
            redCountEl.innerText = red;
        }

        function drawBase() {
            let cx = width / 2;
            let cy = height / 2;
            
            ctx.beginPath();
            ctx.arc(cx, cy, 60, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(51, 204, 255, 0.05)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(51, 204, 255, 0.2)';
            ctx.lineWidth = 1;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(cx, cy, 20, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(51, 204, 255, 0.8)';
            ctx.fill();
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#33ccff';
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        function loop() {
            // 잔상 이펙트를 위한 반투명 배경 (우주 느낌)
            ctx.fillStyle = 'rgba(5, 5, 16, 0.3)';
            ctx.fillRect(0, 0, width, height);

            drawBase();

            // 유닛 업데이트 
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.update(particles);
                p.draw(ctx);

                if (p.health <= 0) {
                    explosions.push(new Explosion(p.pos.x, p.pos.y, p.color));
                    particles.splice(i, 1);
                    updateStats();
                }
            }

            // 레이저(공격) 업데이트
            for (let i = lasers.length - 1; i >= 0; i--) {
                let l = lasers[i];
                ctx.beginPath();
                ctx.moveTo(l.start.x, l.start.y);
                ctx.lineTo(l.end.x, l.end.y);
                ctx.strokeStyle = l.color;
                ctx.lineWidth = l.life * 2;
                ctx.globalAlpha = l.life;
                ctx.stroke();
                ctx.globalAlpha = 1.0;
                
                l.life -= 0.15;
                if (l.life <= 0) lasers.splice(i, 1);
            }

            // 폭발 파티클
            for (let i = explosions.length - 1; i >= 0; i--) {
                let e = explosions[i];
                e.update();
                e.draw(ctx);
                if (e.particles.length === 0) explosions.splice(i, 1);
            }

            animationId = requestAnimationFrame(loop);
        }

        window.addEventListener('resize', resize);
        resize();
        initSimulation();
        loop();
    </script>
</body>
</html>
