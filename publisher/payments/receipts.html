<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>구매 내역 — AI 시대 영성</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary:#0a192f; --accent:#d4af37; --bg:#fdfbf7; --text:#2c3e50; --muted:#5d6d7e; --soft:rgba(212,175,55,0.15); }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Noto Serif KR',serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }

        header {
            background: var(--primary);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(212,175,55,0.3);
        }
        .logo { display: inline-flex; align-items: center; text-decoration: none; gap: 0.6rem; }
        .logo img { height: 34px; width: auto; }
        nav a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-family:'Noto Sans KR',sans-serif;
            font-size: 0.85rem;
            margin-left: 1.5rem;
            letter-spacing: 0.1rem;
        }
        nav a:hover { color: var(--accent); }

        .hero {
            background: linear-gradient(135deg, var(--primary) 0%, #1a3a5c 100%);
            color: white;
            padding: 3rem 2rem 2.4rem;
            text-align: center;
        }
        .hero h1 {
            font-family:'Playfair Display',serif;
            font-size: clamp(1.8rem, 4vw, 2.4rem);
        }
        .hero h1 em { color: var(--accent); font-style: italic; }
        .hero p {
            font-family:'Noto Sans KR',sans-serif;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
            margin-top: 0.5rem;
        }

        main {
            flex: 1;
            max-width: 980px;
            width: 100%;
            margin: 0 auto;
            padding: 2.4rem 1.5rem 4rem;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.4rem;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
        .summary {
            font-family:'Noto Sans KR',sans-serif;
            font-size: 0.88rem;
            color: var(--muted);
        }
        .summary strong { color: var(--primary); font-size: 1rem; }
        .print-btn {
            background: var(--primary);
            color: white;
            border: 1px solid var(--primary);
            padding: 0.55rem 1.2rem;
            border-radius: 3px;
            font-family:'Noto Sans KR',sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .print-btn:hover { background: var(--accent); border-color: var(--accent); color: var(--primary); }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 4px 16px rgba(10,25,47,0.06);
            font-family:'Noto Sans KR',sans-serif;
            font-size: 0.88rem;
        }
        thead {
            background: var(--soft);
        }
        th {
            text-align: left;
            padding: 0.9rem 1rem;
            color: var(--primary);
            font-weight: 700;
            font-size: 0.78rem;
            letter-spacing: 0.05rem;
            border-bottom: 2px solid var(--accent);
        }
        td {
            padding: 0.9rem 1rem;
            border-bottom: 1px solid rgba(10,25,47,0.06);
            vertical-align: top;
        }
        tr:hover td { background: rgba(212,175,55,0.04); }
        .col-amount { text-align: right; font-family:'Playfair Display',serif; font-size: 0.95rem; }
        .col-status { text-transform: uppercase; font-size: 0.72rem; letter-spacing: 0.06rem; font-weight: 700; }
        .status-completed { color: #1a6b30; }
        .status-refunded { color: #8a1a1a; }
        .status-pending { color: #8a6e1a; }
        .receipt-id { font-family: ui-monospace, monospace; font-size: 0.78rem; color: var(--muted); }
        .method-chip { display:inline-block; padding:0.1rem 0.5rem; background:var(--soft); border-radius:3px; font-size:0.78rem; color:#8a6e1a; }

        .empty, .error {
            text-align: center;
            padding: 4rem 1rem;
            color: var(--muted);
        }
        .empty h3, .error h3 {
            font-family:'Playfair Display',serif;
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }
        .empty .cta {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.7rem 1.4rem;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 3px;
            border: 1px solid var(--accent);
        }
        .empty .cta:hover { background: var(--accent); color: var(--primary); }

        footer {
            background: #06111f;
            padding: 1.4rem 2rem;
            color: rgba(255,255,255,0.4);
            font-family:'Noto Sans KR',sans-serif;
            font-size: 0.75rem;
            text-align: center;
        }

        @media print {
            header, footer, nav, .toolbar, .hero p, .print-btn { display: none; }
            .hero { padding: 1.5rem; background: none; color: var(--primary); }
            main { padding: 1rem; }
            tr:hover td { background: transparent; }
            table { box-shadow: none; }
        }

        @media (max-width: 720px) {
            header { padding: 0.8rem 1rem; }
            nav a { margin-left: 0.8rem; font-size: 0.78rem; }
            th, td { padding: 0.6rem 0.5rem; font-size: 0.78rem; }
            .col-isbn, .col-method { display: none; }
        }
    </style>
    <script src="../author_mode.js" defer></script>
    <script src="../beta-banner.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../auth.js" defer></script>
</head>
<body>

<header>
    <a href="/" class="logo">
        <img src="../logo/logo_horizontal.svg" alt="AI 시대 영성">
    </a>
    <nav>
        <a href="/">홈</a>
        <a href="/catalog">도서</a>
        <a href="/library">내 서가</a>
    </nav>
</header>

<section class="hero">
    <h1><em>구매</em> 내역</h1>
    <p>결제 영수증 — 인쇄·보관 가능</p>
</section>

<main id="main">
    <div class="empty" id="loading">
        <p>불러오는 중…</p>
    </div>
</main>

<footer>
    &copy; 2026 AI 시대 영성 출판사 — 상호 AI 시대 영성 · MID vaispi3xtp
</footer>

<script>
(async function () {
    const main = document.getElementById('main');

    // Supabase
    let sb = null, session = null;
    try {
        const cfg = await fetch('../site_config.json').then(r => r.json());
        sb = window.supabase.createClient(cfg.supabase_url, cfg.supabase_anon_key, {
            auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true },
        });
        const r = await sb.auth.getSession();
        session = r.data.session;
    } catch (e) {
        main.innerHTML = `<div class="error"><h3>설정 오류</h3><p>${e.message || e}</p></div>`;
        return;
    }

    if (!session || !session.user) {
        main.innerHTML = `
            <div class="empty">
                <h3>로그인이 필요합니다</h3>
                <p>구매 내역을 보시려면 먼저 로그인해 주세요.</p>
                <a href="/catalog" class="cta">로그인 후 카탈로그</a>
            </div>
        `;
        return;
    }

    // purchases JOIN books (RLS 로 본인 것만)
    const { data: rows, error } = await sb
        .from('purchases')
        .select('id, book_id, amount_paid, payment_method, payment_id, status, purchased_at, refunded_at, books(title, isbn)')
        .order('purchased_at', { ascending: false });

    if (error) {
        main.innerHTML = `<div class="error"><h3>구매 내역을 불러올 수 없습니다</h3><p>${error.message}</p></div>`;
        return;
    }

    if (!rows || rows.length === 0) {
        main.innerHTML = `
            <div class="empty">
                <h3>아직 구매하신 책이 없습니다</h3>
                <p>카탈로그에서 마음에 드는 책을 둘러보세요.</p>
                <a href="/catalog" class="cta">전체 도서 카탈로그</a>
            </div>
        `;
        return;
    }

    const totalPaid = rows
        .filter(r => r.status === 'completed' || r.status === 'paid')
        .reduce((s, r) => s + Number(r.amount_paid || 0), 0);

    const fmtDate = (s) => s ? new Date(s).toLocaleString('ko-KR', {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
    const fmtMethod = (m) => ({CARD:'카드','신용카드':'카드',TRANSFER:'계좌이체',EASY_PAY:'간편결제',VIRTUAL_ACCOUNT:'가상계좌',MOBILE_PHONE:'휴대폰'}[m] || m || '-');
    const fmtStatus = (s) => ({completed:'완료',paid:'완료',pending:'대기',refunded:'환불'}[s] || s || '-');
    const escape = (s) => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

    const tbody = rows.map(r => `
        <tr>
            <td>${fmtDate(r.purchased_at)}</td>
            <td>${escape((r.books && r.books.title) || r.book_id)}</td>
            <td class="col-isbn receipt-id">${escape((r.books && r.books.isbn) || '')}</td>
            <td class="col-method"><span class="method-chip">${fmtMethod(r.payment_method)}</span></td>
            <td class="col-amount">${Number(r.amount_paid).toLocaleString()}원</td>
            <td class="col-status status-${r.status}">${fmtStatus(r.status)}</td>
            <td class="receipt-id">${escape(r.id.slice(0, 8))}…</td>
        </tr>
    `).join('');

    main.innerHTML = `
        <div class="toolbar">
            <div class="summary">
                총 <strong>${rows.length}</strong>건 구매 · 결제 합계 <strong>${totalPaid.toLocaleString()}원</strong>
            </div>
            <button class="print-btn" onclick="window.print()">🖨 인쇄</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>결제 일시</th>
                    <th>도서</th>
                    <th class="col-isbn">ISBN</th>
                    <th class="col-method">결제수단</th>
                    <th class="col-amount">금액</th>
                    <th>상태</th>
                    <th>영수증 번호</th>
                </tr>
            </thead>
            <tbody>${tbody}</tbody>
        </table>
    `;
})();
</script>

</body>
</html>
