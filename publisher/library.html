<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 서가 — AI 시대 영성</title>
    <meta name="description" content="AI 시대 영성 책방의 내 서가. 구매한 책을 어느 기기에서나 이어서 읽으세요.">
    <link rel="canonical" href="https://ai-spirituality-books.vercel.app/library">
    <meta property="og:type" content="website">
    <meta property="og:title" content="내 서가 — AI 시대 영성 책방">
    <meta property="og:description" content="구매한 책을 어느 기기에서나 이어서 읽으세요.">
    <meta property="og:image" content="https://ai-spirituality-books.vercel.app/covers/s1-omnibus.jpg">
    <meta property="og:url" content="https://ai-spirituality-books.vercel.app/library">
    <meta property="og:site_name" content="AI 시대 영성 책방">
    <meta property="og:locale" content="ko_KR">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0a192f">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #0a192f;
            --secondary: #172a45;
            --accent: #d4af37;
            --accent-soft: rgba(212, 175, 55, 0.15);
            --text-main: #2c3e50;
            --text-muted: #5d6d7e;
            --white: #ffffff;
            --bg-light: #fdfbf7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Serif KR', serif;
            color: var(--text-main);
            background-color: var(--bg-light);
            line-height: 1.85;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--primary);
            padding: 1.2rem 3rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }

        .logo { display: inline-flex; align-items: center; text-decoration: none; gap: 0.6rem; }
        .logo img { height: 38px; width: auto; }
        .logo span.label {
            color: rgba(255,255,255,0.55);
            font-size: 0.7rem;
            font-family: 'Noto Sans KR', sans-serif;
            font-weight: 300;
            letter-spacing: 0.3rem;
            border-left: 1px solid rgba(212,175,55,0.4);
            padding-left: 0.7rem;
        }

        nav a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 0.1rem;
            margin-left: 2rem;
            transition: color 0.3s;
        }
        nav a:hover { color: var(--accent); }

        .library-hero {
            background: linear-gradient(135deg, var(--primary) 0%, #0d2440 60%, #1a3a5c 100%);
            padding: 4rem 2rem 3rem;
            text-align: center;
            color: white;
        }
        .library-hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 3rem);
            margin-bottom: 0.6rem;
        }
        .library-hero h1 em { color: var(--accent); font-style: italic; }
        .library-hero .sub {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.65);
            letter-spacing: 0.1rem;
        }
        .library-hero .stats {
            margin-top: 1.5rem;
            display: inline-flex;
            gap: 2rem;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.85rem;
            color: rgba(212,175,55,0.85);
        }
        .library-hero .stats span { display: inline-flex; gap: 0.4rem; align-items: baseline; }
        .library-hero .stats strong {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--accent);
        }

        main {
            flex: 1;
            padding: 3rem 2rem 5rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .lib-state {
            text-align: center;
            padding: 4rem 1rem;
            color: var(--text-muted);
        }
        .lib-state h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }
        .lib-state p {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.95rem;
            line-height: 1.9;
            margin-bottom: 1.4rem;
            max-width: 460px;
            margin-left: auto;
            margin-right: auto;
        }
        .lib-state .cta {
            display: inline-block;
            margin-top: 0.5rem;
            padding: 0.8rem 1.6rem;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border: 1px solid var(--accent);
            border-radius: 3px;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 0.1rem;
            transition: all 0.3s;
            cursor: pointer;
        }
        .lib-state .cta:hover {
            background: var(--accent);
            color: var(--primary);
        }
        .lib-state .cta.secondary {
            background: transparent;
            color: var(--primary);
            border-color: rgba(10,25,47,0.25);
            margin-left: 0.6rem;
        }
        .lib-state .cta.secondary:hover {
            border-color: var(--primary);
            background: rgba(10,25,47,0.04);
        }

        .lib-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.6rem;
        }

        .lib-card {
            background: white;
            border-radius: 4px;
            box-shadow: 0 4px 16px rgba(10,25,47,0.07);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: box-shadow 0.25s ease, border-color 0.25s ease;
            border: 1px solid transparent;
        }
        @media (hover: hover) {
            .lib-card:hover {
                box-shadow: 0 8px 22px rgba(10,25,47,0.10);
                border-color: rgba(212,175,55,0.3);
            }
        }
        .lib-card-cover {
            aspect-ratio: 3 / 4;
            background: #1a3a5c;
            background-size: cover;
            background-position: center;
            border-bottom: 3px solid var(--accent);
        }
        .lib-card-body {
            padding: 1rem 1rem 1.2rem;
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .lib-card-title {
            font-family: 'Noto Serif KR', serif;
            font-weight: 600;
            font-size: 1rem;
            color: var(--primary);
            line-height: 1.4;
            margin-bottom: 0.3rem;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .lib-card-meta {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.72rem;
            color: var(--text-muted);
            letter-spacing: 0.04rem;
            margin-bottom: 0.8rem;
        }
        .lib-card-actions {
            display: flex;
            gap: 0.4rem;
            margin-top: auto;
            flex-wrap: wrap;
        }
        .lib-card-btn {
            flex: 1;
            min-width: 0;
            padding: 0.5rem 0.6rem;
            border: 1px solid rgba(10,25,47,0.2);
            border-radius: 3px;
            background: white;
            color: var(--primary);
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.78rem;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: all 0.2s;
        }
        .lib-card-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .lib-card-btn.primary {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .lib-card-btn.primary:hover {
            background: var(--accent);
            color: var(--primary);
            border-color: var(--accent);
        }
        .lib-card-btn[disabled] {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .lib-card-status {
            display: inline-block;
            font-size: 0.68rem;
            padding: 0.15rem 0.5rem;
            border-radius: 2px;
            background: rgba(212,175,55,0.15);
            color: #8a6c00;
            margin-bottom: 0.4rem;
            letter-spacing: 0.04rem;
        }
        /* 진도 게이지 */
        .lib-card-progress {
            margin: 0.4rem 0 0.7rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .lib-card-progress[hidden] { display: none; }
        .lib-card-progress-bar {
            flex: 1;
            height: 4px;
            background: rgba(10,25,47,0.08);
            border-radius: 2px;
            overflow: hidden;
        }
        .lib-card-progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0;
            transition: width 0.3s ease;
        }
        .lib-card-progress-text {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.72rem;
            color: var(--primary);
            font-weight: 700;
            white-space: nowrap;
        }

        footer {
            background: #06111f;
            padding: 1.6rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(212,175,55,0.15);
        }
        footer .footer-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            color: var(--accent);
        }
        footer p {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.3);
        }

        @media (max-width: 720px) {
            header { padding: 1rem 1.5rem; }
            nav > a { display: none; }    /* 헤더 메뉴만 숨김. chip 드롭다운 보존 */
            footer { flex-direction: column; gap: 0.8rem; text-align: center; }
            .library-hero { padding: 2.5rem 1.2rem 2rem; }
            .lib-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
        }
        .lib-toolbar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1.4rem;
            gap: 0.6rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .lib-toolbar label {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.78rem;
            color: var(--text-muted);
            letter-spacing: 0.05rem;
        }
        .lib-sort {
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.85rem;
            padding: 0.45rem 0.7rem;
            border: 1px solid rgba(10,25,47,0.2);
            border-radius: 3px;
            background: white;
            color: var(--primary);
            cursor: pointer;
        }
        .lib-sort:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(212,175,55,0.15); }
    </style>

    <script src="author_mode.js" defer></script>
    <script src="cart.js" defer></script>
    <script src="beta-banner.js" defer></script>
    <script src="pwa.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js" defer></script>
    <script src="library.js" defer></script>
</head>
<body>

<header>
    <a href="/" class="logo">
        <img src="logo/logo_horizontal.svg" alt="AI 시대 영성">
        <span class="label">PUBLISHER</span>
    </a>
    <nav>
        <a href="/">홈</a>
        <a href="/catalog">도서</a>
        <a href="/library">내 서가</a>
    </nav>
</header>

<section class="library-hero">
    <h1><em>내</em> 서가</h1>
    <p class="sub">로그인 후 구매하신 책을 어느 기기에서나 보실 수 있습니다</p>
    <div class="stats" id="lib-stats" style="display:none">
        <span><strong id="lib-count">0</strong>권</span>
    </div>
</section>

<main>
    <div class="lib-toolbar" id="lib-toolbar" style="display:none">
        <label for="lib-sort">정렬</label>
        <select class="lib-sort" id="lib-sort">
            <option value="added-desc">추가일 최신</option>
            <option value="resume">이어보기 우선</option>
            <option value="title-asc">제목 가나다순</option>
            <option value="pubdate-desc">발행일 최신</option>
        </select>
    </div>
    <div id="lib-main">
        <div class="lib-state" id="lib-loading">
            <p>서가를 불러오는 중…</p>
        </div>
    </div>
</main>

<footer>
    <span class="footer-logo">AI 시대 영성</span>
    <p>&copy; 2026 AI 시대 영성 출판사. All rights reserved.</p>
</footer>

</body>
</html>
